<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SW-WIKI中文资料站</title>

  <!-- Vue3 -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <!-- Vue Router -->
  <script src="https://unpkg.com/vue-router@4"></script>
  <!-- Markdown解析 -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0ea5e9;
      color: white;
      display: flex;
      height: 100vh;
    }

    #app {
      display: flex;
      width: 100%;
    }

    .sidebar {
      width: 250px;
      background: #0284c7;
      padding: 15px;
      overflow-y: auto;
    }

    .sidebar h2 {
      font-size: 18px;
      margin-bottom: 10px;
    }

    .sidebar a {
      display: block;
      color: white;
      text-decoration: none;
      margin: 5px 0;
      padding: 5px;
      border-radius: 6px;
    }

    .sidebar a:hover {
      background: rgba(255,255,255,0.2);
    }

    .content {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }

    .header {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .search-box {
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      padding: 8px;
      border-radius: 6px;
      border: none;
    }

    .article {
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 12px;
    }
  </style>
</head>

<body>
<div id="app">
  <div class="sidebar">
    <h2>SW-WIKI</h2>
    <div class="search-box">
      <input v-model="keyword" placeholder="搜索词条" />
    </div>

    <div v-for="item in filteredList" :key="item.id">
      <router-link :to="'/article/' + item.id">{{ item.title }}</router-link>
    </div>
  </div>

  <div class="content">
    <div class="header">SW-WIKI中文资料站</div>
    <router-view></router-view>
  </div>
</div>

<script>
const articles = [
  {
    id: 1,
    title: "首页",
    content: "# 欢迎\n这是 SW-WIKI 中文资料站"
  },
  {
    id: 2,
    title: "角色介绍",
    content: "# 角色\n这里是角色资料"
  },
  {
    id: 3,
    title: "世界观",
    content: "# 世界观\n这里是世界设定"
  }
];

const Home = {
  template: `<div class="article">欢迎使用 SW-WIKI</div>`
};

const Article = {
  template: `<div class="article" v-html="html"></div>`,
  computed: {
    html() {
      const id = parseInt(this.$route.params.id);
      const article = articles.find(a => a.id === id);
      return article ? marked.parse(article.content) : '未找到文章';
    }
  }
};

const routes = [
  { path: '/', component: Home },
  { path: '/article/:id', component: Article }
];

const router = VueRouter.createRouter({
  history: VueRouter.createWebHashHistory(),
  routes
});

Vue.createApp({
  data() {
    return {
      keyword: ''
    };
  },
  computed: {
    filteredList() {
      return articles.filter(a =>
        a.title.includes(this.keyword)
      );
    }
  }
}).use(router).mount('#app');
</script>
</body>
</html>
